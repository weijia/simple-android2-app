name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      env:
        SKIP_JDK_VERSION_CHECK: 'true'
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-28 build-tools;28.0.3'

    - name: Set up JDK 11 for build
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '6.8.3'

    # ========== 版本号处理 ==========
    - name: Update versionCode before build
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName *"\([^"]*\)".*/\1/')
        BUILD_NUMBER=${{ github.run_number }}
        sed -i "s/versionCode [0-9]*/versionCode ${BUILD_NUMBER}/" app/build.gradle

        echo "Updated versionCode:"
        grep "versionCode" app/build.gradle
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=simple-android2-app-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_NAME}, Build: ${BUILD_NUMBER}"

    # ========== 构建 ==========
    - name: Build APK
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "Building Release APK with keystore..."
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.jks
          export KEYSTORE_PATH=release-key.jks
          gradle assembleRelease
          echo "APK_TYPE=release" >> $GITHUB_ENV
        else
          echo "Building Debug APK..."
          gradle assembleDebug
          echo "APK_TYPE=debug" >> $GITHUB_ENV
        fi

    # ========== 重新签名：解决签名文件压缩 + 证书日期问题 ==========
    - name: Resign APK for old device compatibility
      run: |
        # 创建兼容 keystore：有效期从 2000 年开始，避免旧设备时间验证失败
        keytool -genkeypair \
          -keystore /tmp/compat.keystore \
          -alias compat \
          -storepass compatpass \
          -keypass compatpass \
          -keyalg RSA -keysize 2048 \
          -validity 30000 \
          -dname "CN=CompatApp, OU=Dev, O=Org, C=CN" \
          -startdate "2000/01/01"

        # 定位 APK
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          APK="app/build/outputs/apk/release/app-release.apk"
        else
          APK="app/build/outputs/apk/debug/app-debug.apk"
        fi

        echo "Original APK: $APK"

        # 用 jarsigner 重新 V1 签名（SHA-1，签名文件不压缩）
        jarsigner \
          -keystore /tmp/compat.keystore \
          -storepass compatpass \
          -keypass compatpass \
          -digestalg SHA1 \
          -sigalg SHA1withRSA \
          -signedjar /tmp/resigned-v1.apk \
          "$APK" compat

        # 验证 V1 签名
        jarsigner -verify -verbose /tmp/resigned-v1.apk

        # 用 apksigner 添加 V2 签名（SHA-256，供现代设备使用）
        # 保留现有 V1 签名，只添加 V2
        $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
          --ks /tmp/compat.keystore \
          --ks-pass pass:compatpass \
          --key-pass pass:compatpass \
          --v1-signing-enabled false \
          --v2-signing-enabled true \
          /tmp/resigned-v1.apk

        # 验证最终签名
        $ANDROID_HOME/build-tools/28.0.3/apksigner verify --verbose /tmp/resigned-v1.apk

        # 替换原始 APK
        cp /tmp/resigned-v1.apk "$APK"
        echo "Resigned APK successfully"

    # ========== 重命名 APK ==========
    - name: Rename APK with version
      run: |
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          echo "APK_TYPE=release" >> $GITHUB_ENV
        else
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          echo "APK_TYPE=debug" >> $GITHUB_ENV
        fi

    # ========== SFTP 上传 ==========
    - name: Upload APK to SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}
        remote-path: /home/github/apps/simple-android2-app/${{ steps.version.outputs.apk_name }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    # ========== Artifact 上传 ==========
    - name: Upload APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ env.APK_TYPE }}
        path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}

    # ========== 提交 versionCode 更新 ==========
    - name: Commit versionCode update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add app/build.gradle
        git commit -m "[skip ci] Update versionCode to ${{ steps.version.outputs.build_number }}" || echo "No changes to commit"
        git push origin HEAD:main
