name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      env:
        SKIP_JDK_VERSION_CHECK: 'true'
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-28 build-tools;28.0.3'

    - name: Set up JDK 11 for build
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '6.8.3'

    # ========== 版本号处理 ==========
    - name: Update versionCode before build
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName *"\([^"]*\)".*/\1/')
        BUILD_NUMBER=${{ github.run_number }}
        sed -i "s/versionCode [0-9]*/versionCode ${BUILD_NUMBER}/" app/build.gradle

        echo "Updated versionCode:"
        grep "versionCode" app/build.gradle
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=simple-android2-app-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_NAME}, Build: ${BUILD_NUMBER}"

    # ========== 构建未签名 APK ==========
    - name: Build unsigned APK
      run: |
        gradle assembleRelease
        echo "APK_TYPE=release" >> $GITHUB_ENV
        echo "UNSIGNED_APK=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_ENV

    # ========== 签名：使用 jarsigner + SHA1，兼容 Android 2.1 等旧设备 ==========
    - name: Sign APK with jarsigner
      run: |
        # 允许 JDK 11 使用 SHA-1（旧设备只支持 SHA-1 的 JAR 签名）
        SECURITY_FILE="$JAVA_HOME/conf/security/java.security"
        if [ -f "$SECURITY_FILE" ]; then
          cp "$SECURITY_FILE" "$SECURITY_FILE.bak"
          sed -i 's/jdk.certpath.disabledAlgorithms=.*/jdk.certpath.disabledAlgorithms=/' "$SECURITY_FILE"
          sed -i 's/jdk.jar.disabledAlgorithms=.*/jdk.jar.disabledAlgorithms=/' "$SECURITY_FILE"
        fi

        # 创建兼容 keystore：有效期从 2000 年开始，避免旧设备时间验证失败
        keytool -genkeypair \
          -keystore /tmp/compat.keystore \
          -alias compat \
          -storepass compatpass \
          -keypass compatpass \
          -keyalg RSA -keysize 2048 \
          -validity 30000 \
          -dname "CN=CompatApp, OU=Dev, O=Org, C=CN" \
          -startdate "2000/01/01"

        UNSIGNED="${{ env.UNSIGNED_APK }}"
        OUT="app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}"
        echo "Unsigned APK: $UNSIGNED"
        echo "Output APK: $OUT"
        mkdir -p app/build/outputs/apk/${{ env.APK_TYPE }}

        # 使用 jarsigner 进行 V1 签名，强制 SHA-1 算法
        jarsigner \
          -keystore /tmp/compat.keystore \
          -storepass compatpass \
          -keypass compatpass \
          -digestalg SHA1 \
          -sigalg SHA1withRSA \
          -signedjar "$OUT" \
          "$UNSIGNED" \
          compat

        # 验证签名
        jarsigner -verify -verbose -certs "$OUT"

        # 检查并修复 zipalign（jarsigner 签名后可能破坏对齐）
        $ANDROID_HOME/build-tools/28.0.3/zipalign -c -v 4 "$OUT" || {
          echo "Re-aligning APK..."
          mv "$OUT" "$OUT.unaligned"
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f -p 4 "$OUT.unaligned" "$OUT"
          rm "$OUT.unaligned"
        }
        echo "Signed APK successfully"

    # ========== SFTP 上传 ==========
    - name: Upload APK to SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}
        remote-path: /home/github/apps/simple-android2-app/${{ steps.version.outputs.apk_name }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    # ========== Artifact 上传 ==========
    - name: Upload APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ env.APK_TYPE }}
        path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}

    # ========== 提交 versionCode 更新 ==========
    - name: Commit versionCode update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add app/build.gradle
        git commit -m "[skip ci] Update versionCode to ${{ steps.version.outputs.build_number }}" || echo "No changes to commit"
        git push origin HEAD:main
