name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-5.6.4-bin.zip
        unzip -q gradle-5.6.4-bin.zip
        sudo mv gradle-5.6.4 /opt/gradle
        sudo ln -sf /opt/gradle/bin/gradle /usr/local/bin/gradle

    - name: Install Android SDK
      run: |
        wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
        mkdir -p $HOME/android-sdk
        unzip -q sdk-tools-linux-4333796.zip -d $HOME/android-sdk
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/tools/bin" >> $GITHUB_PATH
        mkdir -p $HOME/.android
        echo "count=0" > $HOME/.android/repositories.cfg
        yes | sdkmanager --licenses >/dev/null 2>&1 || true
        sdkmanager "platforms;android-28" "build-tools;28.0.3" >/dev/null 2>&1

    - name: Build with Gradle
      run: gradle build

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
