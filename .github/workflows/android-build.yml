name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
        unzip -q gradle-7.6.4-bin.zip
        sudo mv gradle-7.6.4 /opt/gradle
        sudo ln -sf /opt/gradle/bin/gradle /usr/local/bin/gradle

    - name: Build with Gradle
      run: gradle build

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
