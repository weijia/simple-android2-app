name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      env:
        SKIP_JDK_VERSION_CHECK: 'true'
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-28 build-tools;28.0.3'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '6.8.3'

    - name: Build unsigned APK
      run: |
        gradle assembleRelease
        echo "UNSIGNED_APK=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_ENV
        echo "APK_NAME=simple-android2-app-build${{ github.run_number }}.apk" >> $GITHUB_ENV

    - name: Sign APK with jarsigner
      run: |
        # 允许 JDK 11 使用 SHA-1
        SECURITY_FILE="$JAVA_HOME/conf/security/java.security"
        if [ -f "$SECURITY_FILE" ]; then
          sed -i 's/jdk.certpath.disabledAlgorithms=.*/jdk.certpath.disabledAlgorithms=/' "$SECURITY_FILE"
          sed -i 's/jdk.jar.disabledAlgorithms=.*/jdk.jar.disabledAlgorithms=/' "$SECURITY_FILE"
        fi

        # 创建 keystore
        keytool -genkeypair \
          -keystore /tmp/compat.keystore \
          -alias compat \
          -storepass compatpass \
          -keypass compatpass \
          -keyalg RSA -keysize 2048 \
          -validity 30000 \
          -dname "CN=Compat, OU=Dev, O=Org, C=CN" \
          -startdate "2000/01/01"

        UNSIGNED="${{ env.UNSIGNED_APK }}"
        OUT="/tmp/${{ env.APK_NAME }}"

        jarsigner \
          -keystore /tmp/compat.keystore \
          -storepass compatpass \
          -keypass compatpass \
          -digestalg SHA1 \
          -sigalg SHA1withRSA \
          -signedjar "$OUT" \
          "$UNSIGNED" \
          compat

        jarsigner -verify "$OUT"

        # zipalign
        $ANDROID_HOME/build-tools/28.0.3/zipalign -f -p 4 "$OUT" "$OUT.aligned"
        mv "$OUT.aligned" "$OUT"
        echo "SIGNED_APK=$OUT" >> $GITHUB_ENV

    - name: Upload APK to SFTP
      if: github.event_name == 'push'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: ${{ env.SIGNED_APK }}
        remote-path: /home/github/apps/simple-android2-app/${{ env.APK_NAME }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    - uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: ${{ env.SIGNED_APK }}
