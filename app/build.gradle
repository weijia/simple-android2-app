apply plugin: 'com.android.application'

android {
    namespace 'com.example.simpleandroid2'
    compileSdk 33

    defaultConfig {
        applicationId "com.example.simpleandroid2"
        minSdk 5
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
